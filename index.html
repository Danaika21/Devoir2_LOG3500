<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Mondial Interactif</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>🌍 Atlas Mondial Interactif</h1>
        <p>Recherchez un pays et découvrez ses informations.</p>
    </header>

    <main>v
        <section class="search-section">
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Ex : Haiti, Canada, France..." autocomplete="off">
                <button type="submit">Rechercher</button>
            </form>
        </section>

        <!-- Zone où les résultats vont s'afficher grâce au JavaScript -->
        <section id="results-section" aria-live="polite"></section>
    </main>

    <footer>
        <p>Projet API REST Countries - LOG3500</p>
    </footer>

    <!-- La fameuse passerelle vers ton script externe -->
    <script src="js/app.js"></script>

</body>
</html>
